# .github/workflows/experiment.yml — AI Research Experiment Runner
# stdout contract: METRICS:{...valid json...}  (train.py 마지막 줄)
# schema_version: 2.0
#
# 실행 환경:
#   organization-level self-hosted runner (gpu-runner-0 ~ gpu-runner-7)
#   → docker exec nextmi-dev-loki + conda run -n yhn
#   → GPU pinning: gpu-runner-N → CUDA_VISIBLE_DEVICES=N
#
# 트리거: workflow_dispatch (experiment_pkg, dispatch_id 입력 필수)
# 환경 변수: GitHub Secrets에 등록 필요
#   ANTHROPIC_API_KEY, OPENAI_API_KEY, GOOGLE_API_KEY
#
# artifact 계약:
#   setup-artifacts    : runner_metadata.json (공통 메타, 단계 간 전달)
#   smoke-artifacts    : smoke 상태 파일 (status만)
#   train-artifacts    : artifacts/ (raw logs, metrics, checkpoints)
#   experiment-results : artifacts/metrics/final_metrics.json + runner_metadata.json
#                        (canonical result_summary는 research_loop.py가 생성)
#
# canonical result_summary.json 책임:
#   workflow는 raw metrics + runner_metadata만 남긴다.
#   최종 해석에 쓰이는 canonical result_summary는 research_loop.py가 생성한다.

name: AI Research Experiment Runner

on:
  workflow_dispatch:
    inputs:
      experiment_pkg:
        description: "실험 패키지 경로 (예: experiments/{slug}/runs/v1)"
        required: true
        type: string
      config_file:
        description: "학습 config 파일 (패키지 내 상대 경로)"
        required: false
        default: "configs/default.yaml"
        type: string
      smoke_only:
        description: "smoke test만 실행하고 종료 (true/false)"
        required: false
        default: "false"
        type: string
      dispatch_id:
        description: "runner가 이 run을 식별하기 위한 고유 ID (GitHubActionsRunner가 자동 생성)"
        required: true
        type: string
      project_dir:
        description: "컨테이너 내부 프로젝트 경로 (비워두면 git remote 매칭으로 자동 감지)"
        required: false
        default: ""
        type: string

env:
  EXPERIMENT_PKG:  ${{ inputs.experiment_pkg }}
  CONFIG_FILE:     ${{ inputs.config_file }}
  CONTAINER_NAME:  ${{ vars.CONTAINER_NAME || 'nextmi-dev-loki' }}
  CONDA_ENV_NAME:  ${{ vars.CONDA_ENV_NAME || 'yhn' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ──────────────────────────────────────────────────────────
# 1. SETUP — 환경 구성 및 패키지 구조 검증
# ──────────────────────────────────────────────────────────
jobs:
  setup:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Print run info
        run: |
          echo "=== Run: ${{ github.run_id }} | SHA: ${{ github.sha }} ==="
          echo "=== Experiment: ${{ env.EXPERIMENT_PKG }} ==="
          echo "=== dispatch_id: ${{ inputs.dispatch_id }} ==="
          echo "=== runner.name: ${{ runner.name }} ==="

      # ── 빈 GPU 자동 선택 (runner 이름 무관) ──
      - name: Detect available GPU
        run: |
          GPU_ID=$(nvidia-smi --query-gpu=index,memory.used --format=csv,noheader,nounits | \
                   awk -F', ' '$2 < 100 {print $1; exit}')
          if [ -z "$GPU_ID" ]; then
            echo "ERROR: 사용 가능한 GPU가 없습니다 (모든 GPU 메모리 사용 중)"
            nvidia-smi --query-gpu=index,memory.used,memory.total --format=csv,noheader
            exit 1
          fi
          echo "CUDA_DEVICE=$GPU_ID" >> "$GITHUB_ENV"
          echo "=== GPU auto-select: ${{ runner.name }} → CUDA_VISIBLE_DEVICES=$GPU_ID ==="

      - name: Detect project directory in container
        run: |
          if [ -n "${{ inputs.project_dir }}" ]; then
            echo "PROJECT_DIR=${{ inputs.project_dir }}" >> "$GITHUB_ENV"
            echo "=== project_dir (manual): ${{ inputs.project_dir }} ==="
          else
            DETECTED=$(docker exec ${{ env.CONTAINER_NAME }} bash -lc "
              find / -maxdepth 6 -name '.git' -type d \
                -not -path '/proc/*' -not -path '/sys/*' -not -path '/dev/*' \
                -not -path '/run/*' -not -path '/tmp/*' 2>/dev/null | \
              while read gitdir; do
                repo_dir=\$(dirname \$gitdir)
                if git -C \$repo_dir remote -v 2>/dev/null | grep -q '${{ github.repository }}'; then
                  echo \$repo_dir
                  break
                fi
              done
            ")
            if [ -z "$DETECTED" ]; then
              echo "ERROR: '${{ github.repository }}' 매칭 git repo를 컨테이너에서 찾지 못했습니다"
              exit 1
            fi
            echo "PROJECT_DIR=$DETECTED" >> "$GITHUB_ENV"
            echo "=== project_dir (auto): $DETECTED ==="
          fi

      - name: Sync checkout to container-accessible path
        run: |
          echo "=== Syncing ${{ github.workspace }} → ${{ env.PROJECT_DIR }} ==="
          rsync -a \
            --exclude '.git' \
            "${{ github.workspace }}/" "${{ env.PROJECT_DIR }}/"

      # ── 작업 3: 컨테이너/conda 환경 검증 ──
      - name: Verify container and conda env
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -lc '
            echo "=== container hostname: $(hostname) ==="
            conda run -n ${{ env.CONDA_ENV_NAME }} python -c "
          import sys
          print(f\"Python: {sys.version}\")
          print(f\"Executable: {sys.executable}\")
          "
          '

      # ── 작업 4: 공유 경로 확인 ──
      - name: Verify shared repo path in container
        run: |
          PKG_PATH="${{ env.PROJECT_DIR }}/${{ env.EXPERIMENT_PKG }}"
          docker exec ${{ env.CONTAINER_NAME }} bash -lc "
            test -d '$PKG_PATH' \
              || (echo 'ERROR: $PKG_PATH not found inside container' && exit 1)
            echo '=== Shared path OK: $PKG_PATH ==='
            ls '$PKG_PATH'/train.py '$PKG_PATH'/model.py > /dev/null
          "

      - name: Validate experiment package path
        run: |
          test -n "${{ env.EXPERIMENT_PKG }}" \
            || (echo "ERROR: experiment_pkg is not set" && exit 1)
          test -d "${{ env.EXPERIMENT_PKG }}" \
            || (echo "ERROR: ${{ env.EXPERIMENT_PKG }} not found" && exit 1)

      - name: Validate package structure
        working-directory: ${{ env.EXPERIMENT_PKG }}
        run: |
          for f in train.py module.py model.py data.py \
                    scripts/smoke_test.py \
                    configs/default.yaml configs/fast.yaml; do
            test -f "$f" || (echo "MISSING: $f" && exit 1)
          done

      - name: Create artifact directories
        working-directory: ${{ env.EXPERIMENT_PKG }}
        run: mkdir -p artifacts/checkpoints artifacts/logs artifacts/metrics

      - name: Save runner metadata
        working-directory: ${{ env.EXPERIMENT_PKG }}
        run: |
          python -c "
          import json, datetime
          meta = {
            'runner':        'github',
            'job_id':        '${{ github.run_id }}',
            'pipeline_id':   '${{ github.run_number }}',
            'runner_name':   '${{ runner.name }}',
            'gpu_device':    '${{ env.CUDA_DEVICE }}',
            'git_sha':       '${{ github.sha }}',
            'git_branch':    '${{ github.ref_name }}',
            'dispatch_id':   '${{ inputs.dispatch_id }}',
            'experiment_pkg': '${{ env.EXPERIMENT_PKG }}',
            'started_at':    datetime.datetime.utcnow().isoformat(),
            'finished_at':   '',
            'duration_s':    0.0,
            'job_url':       'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
            'artifact_uri':  'https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts',
          }
          open('runner_metadata.json', 'w').write(json.dumps(meta, indent=2))
          print('runner metadata saved. dispatch_id=' + meta['dispatch_id'] + ' gpu=' + meta['gpu_device'])
          "

      - name: Upload setup artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: setup-artifacts
          retention-days: 30
          path: ${{ env.EXPERIMENT_PKG }}/runner_metadata.json

# ──────────────────────────────────────────────────────────
# 2. SMOKE — forward pass 및 2 step 검증
# ──────────────────────────────────────────────────────────
  smoke:
    needs: setup
    runs-on: [self-hosted, gpu]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Detect available GPU
        run: |
          GPU_ID=$(nvidia-smi --query-gpu=index,memory.used --format=csv,noheader,nounits | \
                   awk -F', ' '$2 < 100 {print $1; exit}')
          if [ -z "$GPU_ID" ]; then
            echo "ERROR: 사용 가능한 GPU가 없습니다" && exit 1
          fi
          echo "CUDA_DEVICE=$GPU_ID" >> "$GITHUB_ENV"
          echo "=== GPU auto-select: ${{ runner.name }} → CUDA_VISIBLE_DEVICES=$GPU_ID ==="

      - name: Download setup artifacts
        uses: actions/download-artifact@v4
        with:
          name: setup-artifacts
          path: ${{ env.EXPERIMENT_PKG }}

      - name: Run smoke test
        run: |
          PKG_BASE="${{ inputs.project_dir || vars.PROJECT_DIR }}"
          if [ -z "$PKG_BASE" ]; then
            PKG_BASE=$(docker exec ${{ env.CONTAINER_NAME }} bash -lc "
              find / -maxdepth 6 -name '.git' -type d \
                -not -path '/proc/*' -not -path '/sys/*' -not -path '/dev/*' \
                -not -path '/run/*' -not -path '/tmp/*' 2>/dev/null | \
              while read p; do
                dir=\$(dirname \$p)
                if git -C \$dir remote -v 2>/dev/null | grep -q 'agentic-research-project/research-ATI-strict-v2'; then
                  echo \$dir; break
                fi
              done" 2>/dev/null || echo "")
          fi
          docker exec ${{ env.CONTAINER_NAME }} bash -lc "
            cd \"${PKG_BASE}/${{ env.EXPERIMENT_PKG }}\"
            export CUDA_VISIBLE_DEVICES=${{ env.CUDA_DEVICE }}
            conda run -n ${{ env.CONDA_ENV_NAME }} \
              python scripts/smoke_test.py --config configs/fast.yaml &
            PID=\$!
            trap \"kill -TERM -- -\$PID 2>/dev/null; wait \$PID 2>/dev/null\" TERM INT
            wait \$PID
          "

      - name: Write smoke_failed status
        if: failure()
        working-directory: ${{ env.EXPERIMENT_PKG }}
        run: |
          python -c "
          import json, datetime
          r = {'status': 'smoke_failed',
               'dispatch_id': '${{ inputs.dispatch_id }}',
               'created_at': datetime.datetime.utcnow().isoformat()}
          open('smoke_status.json', 'w').write(json.dumps(r, indent=2))
          "

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: smoke-artifacts
          retention-days: 30
          path: ${{ env.EXPERIMENT_PKG }}/smoke_status.json

# ──────────────────────────────────────────────────────────
# 3. TRAIN — 본 학습 실행
# ──────────────────────────────────────────────────────────
  train:
    needs: smoke
    if: inputs.smoke_only != 'true'
    runs-on: [self-hosted, gpu]
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5

      - name: Detect available GPU
        run: |
          GPU_ID=$(nvidia-smi --query-gpu=index,memory.used --format=csv,noheader,nounits | \
                   awk -F', ' '$2 < 100 {print $1; exit}')
          if [ -z "$GPU_ID" ]; then
            echo "ERROR: 사용 가능한 GPU가 없습니다" && exit 1
          fi
          echo "CUDA_DEVICE=$GPU_ID" >> "$GITHUB_ENV"
          echo "=== GPU auto-select: ${{ runner.name }} → CUDA_VISIBLE_DEVICES=$GPU_ID ==="

      - name: Download setup artifacts
        uses: actions/download-artifact@v4
        with:
          name: setup-artifacts
          path: ${{ env.EXPERIMENT_PKG }}

      - name: Create artifact directories
        working-directory: ${{ env.EXPERIMENT_PKG }}
        run: mkdir -p artifacts/checkpoints artifacts/logs artifacts/metrics

      - name: Resolve project directory
        run: |
          PKG_BASE="${{ inputs.project_dir || vars.PROJECT_DIR }}"
          if [ -z "$PKG_BASE" ]; then
            PKG_BASE=$(docker exec ${{ env.CONTAINER_NAME }} bash -lc "
              find / -maxdepth 6 -name '.git' -type d \
                -not -path '/proc/*' -not -path '/sys/*' -not -path '/dev/*' \
                -not -path '/run/*' -not -path '/tmp/*' 2>/dev/null | \
              while read p; do
                dir=\$(dirname \$p)
                if git -C \$dir remote -v 2>/dev/null | grep -q 'agentic-research-project/research-ATI-strict-v2'; then
                  echo \$dir; break
                fi
              done" 2>/dev/null || echo "")
          fi
          echo "TRAIN_PKG_BASE=${PKG_BASE}" >> "$GITHUB_ENV"
          echo "=== train project_dir: ${PKG_BASE} ==="

      - name: Run training
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -lc "
            set -o pipefail
            cd \"${TRAIN_PKG_BASE}/${{ env.EXPERIMENT_PKG }}\"
            export CUDA_VISIBLE_DEVICES=${{ env.CUDA_DEVICE }}
            mkdir -p artifacts/logs
            conda run -n ${{ env.CONDA_ENV_NAME }} \
              python train.py --config ${{ env.CONFIG_FILE }} \
              2>artifacts/logs/stderr.txt | tee artifacts/logs/stdout.txt &
            PID=\$!
            trap \"kill -TERM -- -\$PID 2>/dev/null; wait \$PID 2>/dev/null\" TERM INT
            wait \$PID
          "

      - name: Sync artifacts to workspace
        if: always()
        run: |
          # Training wrote to PROJECT_DIR; copy back to CI workspace for upload/validate
          SRC="${TRAIN_PKG_BASE}/${{ env.EXPERIMENT_PKG }}/artifacts"
          DST="${{ env.EXPERIMENT_PKG }}/artifacts"
          if [ -d "$SRC" ]; then
            mkdir -p "$DST"
            rsync -a "$SRC/" "$DST/"
            echo "=== artifacts synced: $SRC → $DST ==="
          else
            echo "WARNING: no artifacts dir at $SRC"
          fi

      - name: Validate and extract METRICS output
        working-directory: ${{ env.EXPERIMENT_PKG }}
        run: |
          METRICS_LINE=$(grep -E '^METRICS:\{.*\}$' artifacts/logs/stdout.txt | tail -1)
          if [ -z "$METRICS_LINE" ]; then
            echo "ERROR: METRICS line not found in stdout"
            exit 1
          fi
          echo "Parsed: $METRICS_LINE"
          python -c "
          import json, sys
          lines = open('artifacts/logs/stdout.txt').readlines()
          m_lines = [l.strip() for l in lines if l.strip().startswith('METRICS:{')]
          if not m_lines:
              print('ERROR: no METRICS line'); sys.exit(1)
          m = json.loads(m_lines[-1][len('METRICS:'):])
          print('Metrics keys:', list(m.keys()))
          json.dump(m, open('artifacts/metrics/final_metrics.json', 'w'), indent=2)
          print('final_metrics.json saved.')
          "

      - name: Cleanup train processes
        if: always()
        run: |
          # trap+wait가 프로세스 lifecycle 관리 — 광범위 pkill 불필요
          echo "=== Train cleanup: trap+wait handles process lifecycle ==="

      - name: Upload train artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: train-artifacts
          retention-days: 30
          path: |
            ${{ env.EXPERIMENT_PKG }}/artifacts/

# ──────────────────────────────────────────────────────────
# 4. PACKAGE — runner_metadata 완료 처리 및 결과 업로드
#    canonical result_summary는 research_loop.py가 생성한다.
#    workflow는 raw metrics(final_metrics.json)와 runner_metadata만 남긴다.
# ──────────────────────────────────────────────────────────
  package:
    needs: train
    if: success() && inputs.smoke_only != 'true'
    runs-on: [self-hosted, gpu]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Download train artifacts
        uses: actions/download-artifact@v4
        with:
          name: train-artifacts
          path: ${{ env.EXPERIMENT_PKG }}

      - name: Download setup artifacts
        uses: actions/download-artifact@v4
        with:
          name: setup-artifacts
          path: ${{ env.EXPERIMENT_PKG }}

      - name: Finalize runner metadata
        working-directory: ${{ env.EXPERIMENT_PKG }}
        run: |
          python -c "
          import json, datetime
          meta = json.load(open('runner_metadata.json'))
          started = datetime.datetime.fromisoformat(meta['started_at'])
          now = datetime.datetime.utcnow()
          meta['finished_at'] = now.isoformat()
          meta['duration_s'] = round((now - started).total_seconds(), 1)
          open('runner_metadata.json', 'w').write(json.dumps(meta, indent=2))
          print(f'duration_s: {meta[\"duration_s\"]}')
          print(f'dispatch_id: {meta.get(\"dispatch_id\", \"\")}')
          "

      - name: Verify final_metrics.json exists
        working-directory: ${{ env.EXPERIMENT_PKG }}
        run: |
          test -f "artifacts/metrics/final_metrics.json" \
            || (echo "ERROR: final_metrics.json not found — training may have failed" && exit 1)
          python -c "
          import json
          m = json.load(open('artifacts/metrics/final_metrics.json'))
          print('Final metrics:', list(m.keys()), '| values:', list(m.values()))
          "

      - name: Upload final artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: experiment-results
          retention-days: 90
          path: |
            ${{ env.EXPERIMENT_PKG }}/artifacts/metrics/final_metrics.json
            ${{ env.EXPERIMENT_PKG }}/runner_metadata.json
