# .github/workflows/run_pipeline.yml — 전체 연구 파이프라인 실행
#
# main.py (Claude Agent SDK 오케스트레이터)를 컨테이너 내부에서 실행한다.
# 8단계 전체 파이프라인: 주제 분석 → 논문 검색 → 가설 생성 → 검증 → 승인 →
#                        코드 분석 → 모델 생성 → 실험 실행
#
# 주의: 5단계(사용자 승인)에서 AskUserQuestion을 사용하므로,
#       Claude Agent SDK가 자동 승인 모드로 실행되거나
#       사용자가 별도로 응답해야 한다.

name: Research Pipeline

on:
  workflow_dispatch:
    inputs:
      todo_file:
        description: "연구 계획 파일 (기본: todo.md)"
        required: false
        default: "todo.md"
        type: string
      runner_type:
        description: "실험 실행 방식 (local: 직접 실행, github: Actions workflow dispatch)"
        required: false
        default: "github"
        type: string
      project_dir:
        description: "컨테이너 내부 프로젝트 경로 (비워두면 git remote 매칭으로 자동 감지)"
        required: false
        default: ""
        type: string

env:
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME || 'nextmi-dev-loki' }}
  CONDA_ENV_NAME: ${{ vars.CONDA_ENV_NAME || 'yhn' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v5

      - name: Print run info
        run: |
          echo "=== Pipeline Run: ${{ github.run_id }} ==="
          echo "=== todo_file: ${{ inputs.todo_file }} ==="
          echo "=== runner.name: ${{ runner.name }} ==="

      - name: Resolve GPU from runner name (optional)
        run: |
          RUNNER_NAME="${{ runner.name }}"
          if [[ "$RUNNER_NAME" =~ ^gpu-runner-([0-9]+)$ ]]; then
            GPU_ID="${BASH_REMATCH[1]}"
            echo "CUDA_DEVICE=$GPU_ID" >> "$GITHUB_ENV"
            echo "=== GPU pinning: $RUNNER_NAME → CUDA_VISIBLE_DEVICES=$GPU_ID ==="
          else
            echo "=== GPU pinning 건너뜀 (runner: $RUNNER_NAME) ==="
          fi

      - name: Detect project directory in container
        run: |
          if [ -n "${{ inputs.project_dir }}" ]; then
            echo "PROJECT_DIR=${{ inputs.project_dir }}" >> "$GITHUB_ENV"
            echo "=== project_dir (manual): ${{ inputs.project_dir }} ==="
          else
            DETECTED=$(docker exec ${{ env.CONTAINER_NAME }} bash -lc "
              find / -maxdepth 6 -name '.git' -type d \
                -not -path '/proc/*' -not -path '/sys/*' -not -path '/dev/*' \
                -not -path '/run/*' -not -path '/tmp/*' 2>/dev/null | \
              while read gitdir; do
                repo_dir=\$(dirname \$gitdir)
                if git -C \$repo_dir remote -v 2>/dev/null | grep -q '${{ github.repository }}'; then
                  echo \$repo_dir
                  break
                fi
              done
            ")
            if [ -z "$DETECTED" ]; then
              echo "ERROR: '${{ github.repository }}' 매칭 git repo를 컨테이너에서 찾지 못했습니다"
              exit 1
            fi
            echo "PROJECT_DIR=$DETECTED" >> "$GITHUB_ENV"
            echo "=== project_dir (auto): $DETECTED ==="
          fi

      - name: Sync checkout to container-accessible path
        run: |
          echo "=== Syncing ${{ github.workspace }} → ${{ env.PROJECT_DIR }} ==="
          rsync -a --delete \
            --exclude '.git' \
            "${{ github.workspace }}/" "${{ env.PROJECT_DIR }}/"

      - name: Ensure tini is installed (zombie reaper)
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -lc '
            if command -v tini &>/dev/null; then
              echo "=== tini already installed: $(tini --version) ==="
            else
              echo "=== Installing tini ==="
              apt-get update -qq && apt-get install -y -qq tini \
                || (echo "ERROR: tini 설치 실패" && exit 1)
              echo "=== tini installed: $(tini --version) ==="
            fi
          '

      - name: Verify container and conda env
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -lc '
            echo "=== container: $(hostname) ==="
            conda run -n ${{ env.CONDA_ENV_NAME }} python -c "
          import sys
          print(f\"Python: {sys.version}\")
          print(f\"Executable: {sys.executable}\")
          "
          '

      - name: Verify shared repo path
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -lc "
            test -f '${{ env.PROJECT_DIR }}/main.py' \
              || (echo 'ERROR: main.py not found at ${{ env.PROJECT_DIR }}' && exit 1)
            test -f '${{ env.PROJECT_DIR }}/${{ inputs.todo_file }}' \
              || (echo 'ERROR: ${{ inputs.todo_file }} not found' && exit 1)
            echo '=== Repo path OK: ${{ env.PROJECT_DIR }} ==='
          "

      - name: Verify Claude Code CLI
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -lc '
            conda run -n ${{ env.CONDA_ENV_NAME }} claude --version \
              || (echo "ERROR: claude CLI not available" && exit 1)
          '

      - name: Run research pipeline
        run: |
          # tini -s: subreaper 모드 — 고아 프로세스 자동 reaping (zombie 방지)
          # setsid: 프로세스 그룹 생성 → cleanup에서 그룹 단위 종료 가능
          docker exec \
            -e ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            -e GITHUB_TOKEN="${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}" \
            -e GITHUB_OWNER="${{ github.repository_owner }}" \
            -e GITHUB_REPO="${{ github.event.repository.name }}" \
            ${{ env.CONTAINER_NAME }} bash -lc '
            cd "${{ env.PROJECT_DIR }}"
            export CUDA_VISIBLE_DEVICES=${{ env.CUDA_DEVICE }}
            setsid tini -s -- conda run -n ${{ env.CONDA_ENV_NAME }} \
              python main.py \
                --todo "${{ inputs.todo_file }}" \
                --auto-approve \
                --runner-type "${{ inputs.runner_type }}" &
            PID=$!
            echo $PID > /tmp/.pipeline_pid
            wait $PID
          '

      - name: Cleanup pipeline processes
        if: always()
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -lc '
            # PID 파일에서 프로세스 그룹 + 자식 트리 종료
            if [ -f /tmp/.pipeline_pid ]; then
              PID=$(cat /tmp/.pipeline_pid)
              # 1) 프로세스 트리 전체 SIGTERM (자식의 자식까지)
              pkill -TERM -P $PID 2>/dev/null || true
              kill -TERM -- -$PID 2>/dev/null || true
              sleep 2
              # 2) 남은 프로세스 강제 종료
              pkill -9 -P $PID 2>/dev/null || true
              kill -9 -- -$PID 2>/dev/null || true
              rm -f /tmp/.pipeline_pid
              echo "=== Pipeline processes cleaned up (PGID=$PID) ==="
            fi
            # 잔여 main.py 프로세스 정리
            pkill -f "python main.py --todo" 2>/dev/null || true
            # claude CLI 고아 프로세스 정리
            pkill -f "claude" 2>/dev/null || true
            # DataLoader worker 고아 정리
            pkill -f "pt_data_worker" 2>/dev/null || true
            echo "=== Orphan cleanup done ==="
          '

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pipeline-results
          retention-days: 90
          path: |
            ${{ env.PROJECT_DIR }}/experiments/*/results/
            ${{ env.PROJECT_DIR }}/experiments/*/reports/
