# configs/default.yaml
seed: 42
accelerator: "auto"
precision: "32-true"
devices: 1
strategy: "auto"

# 학습 (reference bank 구축)
epochs: 3
batch_size: 16
val_batch_size: 4
optimizer: "adamw"
lr: 1.0e-4
lr_min: 1.0e-6
weight_decay: 1.0e-4
gradient_clip: 1.0
loss_function: "l2"

# 데이터 경로
data_dir: "/data/0_Data/0_1_INDUST/ATI"
source_dir: "/data/0_Data/0_1_INDUST/ATI/source"
reference_dir: "/data/0_Data/0_1_INDUST/ATI/reference_normal"

# 이미지 설정
image_height: 6559
image_width: 6559
patch_size: 256
patch_overlap: 32
use_augmentation: false
normalize: true

# 검증 샘플링 설정
max_val_source_images: 3
val_patches_per_image: 50
num_synthetic_samples: 64
num_synthetic_val_samples: 32

# 모델 파라미터
k_references: 8
target_fpr: 0.01
min_defect_area: 100

# 평가
primary_metric: "auroc"
eval_frequency: 1
checkpoint_dir: "artifacts/checkpoints"

# 성능 제약
max_inference_time: 120.0
max_memory_gb: 16.0
min_throughput: 0.5
