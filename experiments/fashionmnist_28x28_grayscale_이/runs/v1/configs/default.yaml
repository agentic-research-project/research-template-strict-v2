# FashionMNIST Lightweight CNN (DWSep + SE + Residual)
experiment_name: fashionmnist_dscnn_se

# Model
in_channels: 1
channels: [32, 64, 128]
num_classes: 10
se_reduction: 8
blocks_per_stage: 2

# Training
optimizer: adamw
lr: 0.001
weight_decay: 0.0001
epochs: 30
batch_size: 128
seed: 42
gradient_clip: 1.0
precision: bf16-mixed

# Scheduler
lr_min: 0.000001

# Data
data_dir: /data/0_Data/5_OpenSource/1_fashion_mnist
val_ratio: 0.1
num_workers: 4

# Evaluation
primary_metric: accuracy
